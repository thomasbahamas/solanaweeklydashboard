name: Solana Weekly Dashboard

on:
  schedule:
    # Full pipeline daily at 4:30 AM PT (11:30 UTC). GitHub cron can drift
    # 5-15 min, so this reliably finishes before Torrey's 5:30 AM checkin.
    - cron: '30 11 * * *'
    # Market-only refresh every 4h (0, 4, 8, 16, 20 UTC — skip 12 UTC band which is the full run)
    - cron: '0 0,4,8,16,20 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - market-only
      send_newsletter:
        description: 'Send newsletter on manual full run'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # State files that must survive across runs. Market-only refreshes need
      # the latest full data snapshot; otherwise they publish a dashboard with
      # only prices and mark every slower-moving source as missing.
      - name: Create data directory
        run: mkdir -p data

      - name: Restore pipeline state
        id: state-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            data/*.json
          key: dashboard-state-${{ github.run_id }}
          restore-keys: |
            dashboard-state-

      - name: Run pipeline
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          KIT_API_SECRET: ${{ secrets.KIT_API_SECRET }}
        run: |
          if [[ "${{ github.event.schedule }}" == "0 0,4,8,16,20 * * *" ]]; then
            echo "Running market-only refresh (4h cron)"
            python run_pipeline.py --market-only
          elif [[ "${{ github.event.inputs.mode }}" == "market-only" ]]; then
            echo "Running market-only refresh (manual trigger)"
            python run_pipeline.py --market-only
          else
            echo "Running full pipeline"
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.send_newsletter }}" != "true" ]]; then
              python run_pipeline.py --skip-delivery
            else
              python run_pipeline.py
            fi
          fi

      - name: Save pipeline state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/*.json
          key: dashboard-state-${{ github.run_id }}

      - name: Send Telegram notification
        if: success() && github.event.schedule != '0 0,4,8,16,20 * * *'
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python deliver_telegram.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true

      - name: Archive data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-data-${{ github.run_id }}
          path: data/*.json
          retention-days: 30
